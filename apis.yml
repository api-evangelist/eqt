aid: eqt
name: EQT Corporation
description: >-
  EQT Corporation is the largest producer of natural gas in the United
  States, headquartered in Pittsburgh, Pennsylvania. EQT operates in the
  Appalachian Basin and combines exploration and production technology
  with environmental stewardship initiatives, including a Scope 1 and
  Scope 2 net-zero commitment. EQT does not maintain a public developer
  program or open APIs; data access is limited to investor relations,
  ESG reporting, and partner-facing portals such as Equitrans Midstream
  customer services.
